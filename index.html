<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
    <link

    />
    <link rel="stylesheet" href="./src/style.css" />

    <title>Home | UnWeb</title>
  </head>
  <body id="body">
    <!-- Canvas(Grid)... -->
    <canvas id="grid"></canvas>

    <!-- Navbar... -->
    <nav class="navbar navbar-expand-lg transparent" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="./index.html"
          >Un<element class="secondary-color">Web</element></a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="./index.html"

            </li>
            <li class="nav-item">
              <a class="nav-link" href="./about.html">About</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content... -->
    <div class="text-center">
      <h1 class="text-center heading">Welcome to UnWeb</h1>
      <span class="cursor secondary-color">|</span>
    </div>

    <!-- Spacing...  -->
    <br />
    <br />
    <br />
    <br />

    <div class="card">

        class="img-fluid card-img"
        alt="Brief Description"
      />

        UnWeb is for experimenting and can also be used as a template (See

      </p>
    </div>

    <!--Buttons-->
    <div class="d-flex justify-content-center gap-5">
      <a href="https://s4g-dev.itch.io/" class="btn btn-web itch" target="_blank" rel="noopener noreferrer">
        <img src="./public/itch.svg" alt="Itch-icon" width="22%">
        Itch
      </a>
      <a href="https://github.com/S4GGamingYt" class="btn btn-web github" target="_blank" rel="noopener noreferrer">
        <img src="./public/github.svg" alt="Github-icon" width="22%">
        Github

    </div>

    <!-- Scripts -->
    <script type="module" src="./src/main.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
